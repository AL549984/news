name: Validate articles data

on:
  push:
    branches: [main]
    paths:
      - articles.js
      - .github/workflows/validate-articles.yml
  pull_request:
    paths:
      - articles.js
      - .github/workflows/validate-articles.yml
      - scripts/validate_articles_js.mjs
      - package.json
      - package-lock.json
  schedule:
    - cron: "20 23 * * *"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate articles.js
        run: npm run validate:articles
